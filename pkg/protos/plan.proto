syntax = "proto3";

package martiancloud.tharsis.api.plan;

option go_package = "gitlab.com/infor-cloud/martian-cloud/tharsis/tharsis-api/pkg/protos/gen";

import "metadata.proto";

// PlanStatus defines the status of a Plan.
enum PlanStatus {
  UNSPECIFIED = 0;
  CREATED     = 1;
  PENDING     = 2;
  QUEUED      = 3;
  RUNNING     = 4;
  FINISHED    = 5;
  ERRORED     = 6;
  CANCELED    = 7;
}

// GetPlanByIDRequest is the input for retrieving a Plan by its ID.
message GetPlanByIDRequest {
  string id = 1;
}

// UpdatePlanRequest is the input for updating a Plan.
message UpdatePlanRequest {
  string          id            = 1;
  optional int64  version       = 2;
  // Field number 3 was used for the status field which has been removed
  reserved 3;
  bool            has_changes   = 4;
  optional string error_message = 5;
}

// PlanSummary contains a summary of the types of changes a plan includes.
message PlanSummary {
  int32 resource_additions    = 1;
  int32 resource_changes      = 2;
  int32 resource_destructions = 3;
}

// Plan represents a Terraform plan.
message Plan {
  metadata.ResourceMetadata metadata          = 1;
  string                    deprecated_status = 2 [deprecated = true];
  optional string           error_message     = 3;
  bool                      has_changes       = 4;
  PlanSummary               summary           = 5;
  optional string           latest_job_id     = 6;
  PlanStatus                status            = 7;
}
