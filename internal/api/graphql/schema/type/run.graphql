enum RunSort {
  CREATED_AT_ASC
  CREATED_AT_DESC
  UPDATED_AT_ASC
  UPDATED_AT_DESC
}

enum RunStatus {
  applied
  apply_queued
  applying
  canceled
  discarded
  errored
  pending
  plan_queued
  planned
  planned_and_finished
  planning
  queuing
  queuing_apply
}

type RunConnection {
  totalCount: Int!
  pageInfo: PageInfo!
  edges: [RunEdge]
}

type RunEdge {
  cursor: String!
  node: Run
}

type RunVariable {
  namespacePath: String
  category: VariableCategory!
  key: String!
  value: String
  sensitive: Boolean!
  versionId: String
  includedInTfConfig: Boolean
}

type RunVariableSensitiveValue {
  versionId: String!
  value: String!
}

type Run implements Node {
  id: ID!
  metadata: ResourceMetadata!
  createdBy: String!
  status: RunStatus!
  isDestroy: Boolean!
  workspace: Workspace!
  configurationVersion: ConfigurationVersion
  plan: Plan!
  apply: Apply
  variables: [RunVariable!]!
  sensitiveVariableValues: [RunVariableSensitiveValue!]!
  stateVersion: StateVersion
  moduleSource: String
  moduleVersion: String
  moduleDigest: String
  forceCanceledBy: String
  forceCanceled: Boolean!
  forceCancelAvailableAt: Time
  comment: String!
  terraformVersion: String!
  targetAddresses: [String!]!
  refresh: Boolean!
  refreshOnly: Boolean!
  speculative: Boolean!
  autoApply: Boolean!
  assessment: Boolean!
}

type RunEvent {
  action: String!
  run: Run!
}

input RunSubscriptionInput {
  workspacePath: String
    @deprecated(
      reason: "Use workspaceId field instead, which accepts a TRN (Tharsis Resource Name)"
    )
  workspaceId: String
  runId: String
  ancestorGroupId: String
}

type RunMutationPayload {
  clientMutationId: String
  run: Run
  problems: [Problem!]!
}

type SetVariablesIncludedInTFConfigPayload {
  clientMutationId: String
  run: Run
  problems: [Problem!]!
}

input RunVariableInput {
  category: VariableCategory!
  hcl: Boolean
  key: String!
  value: String!
}

input CreateRunInput {
  clientMutationId: String
  workspacePath: String
    @deprecated(
      reason: "Use workspaceId field instead, which accepts a TRN (Tharsis Resource Name)"
    )
  workspaceId: String
  configurationVersionId: String
  isDestroy: Boolean
  moduleSource: String
  moduleVersion: String
  comment: String
  terraformVersion: String
  variables: [RunVariableInput!]
  targetAddresses: [String!]
  refresh: Boolean
  refreshOnly: Boolean
  speculative: Boolean
  """
  When true, the run's apply phase starts automatically once the plan finishes
  with changes, instead of waiting for a manual apply. Defaults to false.
  """
  autoApply: Boolean
  """
  When true and moduleVersion is unset or a constraint range, prerelease module
  versions are eligible to be selected as "latest". Defaults to false. Has no
  effect when moduleVersion is an exact match. Requires moduleSource to be set.
  """
  includeModulePrereleases: Boolean
}

input ApplyRunInput {
  clientMutationId: String
  runId: String!
  comment: String
}

input SetRunAutoApplyInput {
  clientMutationId: String
  runId: String!
  """
  When true, the run's apply phase starts automatically once the plan finishes
  with changes. Can only be changed before the plan completes.
  """
  autoApply: Boolean!
}

input CancelRunInput {
  clientMutationId: String
  runId: String!
  comment: String
  force: Boolean
}

"""
RetryRunNodeInput retries a run's failed or canceled plan/apply node by resetting it
to pending. The node is identified by runId and nodePath ("plan" or "apply").
"""
input RetryRunNodeInput {
  clientMutationId: String
  runId: String!
  nodePath: String!
}

"""
DiscardRunInput discards a run that is in the planned state, moving it to the
terminal discarded status.
"""
input DiscardRunInput {
  clientMutationId: String
  runId: String!
}

input UndiscardRunInput {
  clientMutationId: String
  runId: String!
}

input SetVariablesIncludedInTFConfigInput {
  runId: String!
  variableKeys: [String!]!
}
