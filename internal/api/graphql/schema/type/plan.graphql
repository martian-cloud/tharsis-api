enum PlanStatus {
  created
  canceled
  queued
  errored
  finished
  pending
  running
}

enum PlanChangeAction {
  NOOP
  CREATE
  READ
  UPDATE
  DELETE_THEN_CREATE
  CREATE_THEN_DELETE
  DELETE
  FORGET
}

enum TerraformResourceMode {
  data
  managed
}

enum PlanChangeWarningType {
  before
  after
}

type PlanChangeWarning {
  changeType: PlanChangeWarningType!
  line: Int!
  message: String!
}

type PlanResourceChange {
  action: PlanChangeAction!
  address: String!
  mode: TerraformResourceMode!
  providerName: String!
  resourceType: String!
  resourceName: String!
  moduleAddress: String!
  unifiedDiff: String!
  originalSource: String!
  imported: Boolean!
  drifted: Boolean!
  warnings: [PlanChangeWarning!]!
}

type PlanOutputChange {
  action: PlanChangeAction!
  outputName: String!
  unifiedDiff: String!
  originalSource: String!
  warnings: [PlanChangeWarning!]!
}

type PlanChanges {
  resources: [PlanResourceChange!]!
  outputs: [PlanOutputChange!]!
}

type PlanSummary {
  resourceAdditions: Int!
  resourceChanges: Int!
  resourceDestructions: Int!
  resourceImports: Int!
  resourceDrift: Int!
  outputAdditions: Int!
  outputChanges: Int!
  outputDestructions: Int!
}

type Plan {
  id: ID!
  metadata: ResourceMetadata! @deprecated(
      reason: "use run metadata instead"
  )
  status: PlanStatus!
  errorMessage: String
  hasChanges: Boolean!
  summary: PlanSummary!
  currentJob: Job
  jobs(
    after: String
    before: String
    first: Int
    last: Int
    sort: JobSort
  ): JobConnection!
  changes: PlanChanges
  diffSize: Int!
  resourceAdditions: Int!
    @deprecated(
      reason: "Field has been moved to the PlanSummary type and will be removed in an upcoming release"
    )
  resourceChanges: Int!
    @deprecated(
      reason: "Field has been moved to the PlanSummary type and will be removed in an upcoming release"
    )
  resourceDestructions: Int!
    @deprecated(
      reason: "Field has been moved to the PlanSummary type and will be removed in an upcoming release"
    )
  checkResults: [CheckResult!]!
}
