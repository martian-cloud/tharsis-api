enum ApplyStatus {
  canceled
  created
  errored
  finished
  pending
  queued
  running
  skipped
}

type Apply {
  id: ID!
  metadata: ResourceMetadata! @deprecated(
      reason: "use run metadata instead"
  )
  status: ApplyStatus!
  currentJob: Job
  jobs(
    after: String
    before: String
    first: Int
    last: Int
    sort: JobSort
  ): JobConnection!
  triggeredBy: String
  comment: String!
  errorMessage: String
}
